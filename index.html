<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StyleVee</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
      text-align:center;
    }

    header{
      background:black;
      color:white;
      padding:20px;
    }

    h1{
      margin:0;
      font-size:48px;
    }

    .hero{
      padding:100px 20px;
    }

    .hero h2{
      font-size:40px;
      color:#222;
    }

    .hero p{
      font-size:20px;
      color:#555;
    }

    button{
      padding:15px 30px;
      background:black;
      color:white;
      border:none;
      font-size:18px;
      cursor:pointer;
      border-radius:5px;
    }

    button:hover{
      background:#444;
    }
  </style>
</head>

<body>

<header>
  <h1>StyleVee</h1>
</header>

<section class="hero">
  <h2>Premium Menswear</h2>
  <p>Formal trousers, chinos, shirts & luxury fashion.</p>

  <button>Shop Now</button>
</section>

</body>
</html>
